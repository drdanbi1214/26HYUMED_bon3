<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>의대 실습 스케줄러</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    body { font-family: 'Pretendard', sans-serif; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* ── CHERRY BLOSSOM FEATURE ── remove this block when done ── */

    /* 배경은 그대로, 카드/테두리/버튼만 핑크로 */
    html.blossom .bg-slate-50  { background-color: #fdf8fa !important; }
    html.blossom .bg-white     { background-color: #fff5f8 !important; }
    html.blossom .border-slate-200 { border-color: #fce7f3 !important; }
    html.blossom .border-slate-800 { border-color: #fce7f3 !important; }

    /* 검색 버튼 (from-blue-500 to-blue-600) → 핑크 */
    html.blossom .bg-gradient-to-br.from-blue-500 {
      background-image: linear-gradient(to bottom right, #f472b6, #db2777) !important;
    }
    /* D-Day 카드 (from-blue-50 to-indigo-50) → 연핑크 */
    html.blossom .bg-gradient-to-br.from-blue-50 {
      background-image: linear-gradient(to bottom right, #fdf2f8, #fce7f3) !important;
    }
    html.blossom .border-blue-100  { border-color: #fbcfe8 !important; }
    html.blossom .text-blue-600    { color: #db2777 !important; }
    html.blossom .dark\:text-blue-400 { color: #f472b6 !important; }

    /* 검색 input 포커스 링 */
    html.blossom .focus\:ring-blue-500\/30:focus {
      --tw-ring-color: rgba(244,114,182,0.3) !important;
    }

    /* 작은 꽃잎: 천천히 아련하게, 좌우 흔들림 넓게 */
    @keyframes sakura-fall {
      0%   { transform: translateY(-60px) translateX(0px)   rotate(0deg);   opacity: 0.9; }
      20%  { transform: translateY(20vh)  translateX(38px)  rotate(90deg);  }
      40%  { transform: translateY(40vh)  translateX(-28px) rotate(200deg); }
      60%  { transform: translateY(60vh)  translateX(44px)  rotate(310deg); }
      80%  { transform: translateY(80vh)  translateX(-22px) rotate(430deg); }
      100% { transform: translateY(110vh) translateX(14px)  rotate(540deg); opacity: 0.2; }
    }

    /* 큰 꽃잎: 훅 빠르게 (React 1회성 animation) */
    @keyframes sakura-fall-large {
      0%   { transform: translateY(-60px) translateX(0px)  rotate(0deg);   opacity: 1; }
      15%  { transform: translateY(15vh)  translateX(20px)  rotate(108deg); }
      30%  { transform: translateY(35vh)  translateX(-15px) rotate(216deg); }
      55%  { transform: translateY(65vh)  translateX(25px)  rotate(360deg); }
      80%  { transform: translateY(90vh)  translateX(-10px) rotate(480deg); }
      100% { transform: translateY(115vh) translateX(5px)   rotate(576deg); opacity: 0.5; }
    }

    /* 나무 주변 미니 꽃잎 */
    @keyframes sakura-fall-tree {
      0%   { transform: translateY(-8px)  translateX(0px)  rotate(0deg);   opacity: 1; }
      50%  { transform: translateY(100px) translateX(10px) rotate(180deg); }
      100% { transform: translateY(210px) translateX(-5px) rotate(360deg); opacity: 0; }
    }

    @keyframes petal-bloom {
      0%   { transform: scale(0.5); opacity: 0; }
      60%  { transform: scale(1.06); opacity: 1; }
      100% { transform: scale(1);   opacity: 1; }
    }

    @keyframes slide-up {
      0%   { transform: translateY(100%); }
      100% { transform: translateY(0); }
    }
    /* ── END CHERRY BLOSSOM FEATURE ── */
  </style>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              dark: '#0c1220',
              accent: '#3b82f6',
              accentGradient: 'linear-gradient(135deg, #3b82f6, #6366f1)'
            }
          }
        }
      }
    }
  </script>
  <script type="module" crossorigin src="/assets/index-CTEVZmc5.js"></script>
</head>
<body class="bg-slate-50 dark:bg-[#0c1220] transition-colors duration-300">
  <div id="root"></div>
</body>
</html>
